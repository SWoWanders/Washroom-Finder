<!DOCTYPE html>
<html>
<head>
    <title>Ottawa Washroom Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; } /* Make the map full screen */
        body { margin: 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([45.4215, -75.6972], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const washroomUrl = "https://maps.ottawa.ca/arcgis/rest/services/PublicWashrooms/MapServer/0/query?outFields=*&where=1%3D1&f=geojson";
        let washroomData = null; // We'll store the "stickers" here once they arrive

        // --- STEP A: FETCH THE DATA ---
        fetch(washroomUrl)
            .then(response => response.json())
            .then(data => {
                washroomData = data; // Save it for our distance math later
                L.geoJSON(data).addTo(map);
            });

        // --- STEP B: PASTE THE "RADAR" AND "DISTANCE" FUNCTIONS HERE ---
        // (This is Step 2 and 3 from my previous message)
        function findClosestWashroom(lat, lon) {
    let closest = null;
    let minDistance = Infinity;

    // 'washroomData' is the variable where you stored your fetch() result
    washroomData.features.forEach(toilet => {
        const tLon = toilet.geometry.coordinates[0];
        const tLat = toilet.geometry.coordinates[1];
        
        // Calculate distance (simplified for small distances)
        const d = Math.sqrt(Math.pow(lat - tLat, 2) + Math.pow(lon - tLon, 2));
        
        if (d < minDistance) {
            minDistance = d;
            closest = toilet;
        }
    });

    if (closest) {
        document.getElementById('info').innerText = `Closest: ${closest.properties.NAME}`;
        updateRadar(lat, lon, closest.geometry.coordinates[1], closest.geometry.coordinates[0]);
    }
}
function updateRadar(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
    const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
              Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
    
    let bearing = Math.atan2(y, x) * 180 / Math.PI;
    bearing = (bearing + 360) % 360; // Keep it between 0 and 360

    // Rotate the arrow icon in your HTML
    document.getElementById('arrow').style.transform = `rotate(${bearing}deg)`;
}
        
        function findClosestWashroom(lat, lon) {
            if (!washroomData) return; // Wait until data is loaded
            
            let closest = null;
            let minDistance = Infinity;

            washroomData.features.forEach(toilet => {
                const tLon = toilet.geometry.coordinates[0];
                const tLat = toilet.geometry.coordinates[1];
                
                // The "As the crow flies" math
                const d = Math.sqrt(Math.pow(lat - tLat, 2) + Math.pow(lon - tLon, 2));
                
                if (d < minDistance) {
                    minDistance = d;
                    closest = toilet;
                }
            });

            if (closest) {
                document.getElementById('info').innerText = `Closest: ${closest.properties.NAME}`;
                updateRadar(lat, lon, closest.geometry.coordinates[1], closest.geometry.coordinates[0]);
            }
        }

        function updateRadar(lat1, lon1, lat2, lon2) {
            // This is the math that turns coordinates into a compass angle
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            
            let bearing = Math.atan2(y, x) * 180 / Math.PI;
            bearing = (bearing + 360) % 360; 

            document.getElementById('arrow').style.transform = `rotate(${bearing}deg)`;
        }

        // --- STEP C: PASTE THE "TRACKER" HERE ---
        // This tells the phone to start watching your movement
        navigator.geolocation.watchPosition((position) => {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;
            
            // Call our math function every time we move
            findClosestWashroom(userLat, userLon);
        }, (err) => console.error(err), { enableHighAccuracy: true });

    </script>
</body>
</html>
