<!DOCTYPE html>
<html>
<head>
    <title>Ottawa Washroom Finder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { flex-grow: 1; width: 100%; }
        #radar { 
            height: 240px; 
            width: 100%; 
            background: #ffffff; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            border-top: 4px solid #004b7a;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 2000;
        }
        #arrow { font-size: 85px; transition: transform 0.1s linear; display: inline-block; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2)); }
        #info { margin-top: 12px; text-align: center; padding: 0 20px; line-height: 1.5; color: #333; }
        .distance-tag { font-size: 1.2rem; font-weight: bold; color: #004b7a; }
        .time-tag { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="radar">
        <div id="arrow">⬆️</div>
        <div id="info">Initializing...</div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
    // ... existing map and marker setup ...

// NEW: Status logger to help you debug on your phone
function updateStatus(msg) {
    const info = document.getElementById('info');
    if (info) info.innerText = msg;
}

// 1. Start by fetching data
updateStatus("Fetching Ottawa data...");
fetch(washroomUrl)
    .then(res => res.json())
    .then(data => {
        washroomData = data;
        L.geoJSON(data, {
            pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 7, color: '#004b7a', fillColor: '#004b7a', fillOpacity: 0.8 })
        }).addTo(map);
        
        updateStatus("Data loaded. Waiting for GPS...");

        // 2. Start GPS tracking
        navigator.geolocation.watchPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            userMarker.setLatLng([lat, lon]);
            map.panTo([lat, lon]);
            
            // If we have data, find the closest loo
            if (washroomData) {
                findClosestWashroom(lat, lon);
            } else {
                updateStatus("GPS found, but data is missing...");
            }
        }, (err) => {
            // This will tell you if GPS is blocked
            updateStatus("GPS Error: " + err.message);
        }, { 
            enableHighAccuracy: true,
            timeout: 10000, // Wait 10 seconds before erroring
            maximumAge: 0 
        });
    })
    .catch(err => updateStatus("Fetch Error: " + err.message));

// 3. Compass (Non-blocking)
window.addEventListener('deviceorientationabsolute', (event) => {
    if (event.alpha !== null) {
        currentCompass = event.alpha;
        // Rotation code here...
    }
}, true);

    </script>
</body>
</html>
