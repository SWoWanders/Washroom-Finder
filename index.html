<!DOCTYPE html>
<html>
<head>
    <title>Ottawa Washroom Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; } /* Make the map full screen */
        body { margin: 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        let userLat, userLon;

// This asks the phone for permission and starts the tracker
navigator.geolocation.watchPosition((position) => {
    userLat = position.coords.latitude;
    userLon = position.coords.longitude;
    
    console.log(`You are at: ${userLat}, ${userLon}`);
    
    // Every time the user moves, we find the closest loo
    findClosestWashroom(userLat, userLon);
}, (error) => {
    console.error("GPS Error: ", error);
}, { enableHighAccuracy: true });

        // 3. Initialize the Map centered on downtown Ottawa
        const map = L.map('map').setView([45.4215, -75.6972], 13);

        // 4. Add the actual map graphics (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 5. The Link you copied from the screenshot!
        const washroomUrl = "https://maps.ottawa.ca/arcgis/rest/services/PublicWashrooms/MapServer/0/query?outFields=*&where=1%3D1&f=geojson";

        // 6. Fetch the data and put it on the map
        fetch(washroomUrl)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        // This makes a popup appear when you click a dot
                        layer.bindPopup("Public Washroom: " + feature.properties.NAME);
                    }
                }).addTo(map);
            })
            .catch(err => console.error("Error loading washrooms:", err));
    </script>
</body>
</html>
